<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Deployer — Settings</title>
  <style>
    :root {
      color-scheme: light dark;
      /* Dark by default — matches the popup window. */
      --bg: #0a0a0a;
      --card: #0f0f0f;
      --card-inner: #141414;
      --fg: #f4f4f5;
      --fg-dim: #a1a1aa;
      --fg-dimmer: #71717a;
      --border: rgba(255, 255, 255, 0.07);
      --border-strong: rgba(255, 255, 255, 0.12);
      --hover: rgba(255, 255, 255, 0.05);
      --btn-bg: #1c1c1e;
      --btn-bg-hover: #242426;
      --ok: #22c55e;
      --err: #ef4444;
      --warn: #eab308;
      --muted: #6b7280;
      --accent: #ffffff;
      --primary: #ffffff;
      --primary-fg: #0a0a0a;
      --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --card: #ffffff;
        --card-inner: #f4f4f5;
        --fg: #09090b;
        --fg-dim: #52525b;
        --fg-dimmer: #a1a1aa;
        --border: rgba(0, 0, 0, 0.08);
        --border-strong: rgba(0, 0, 0, 0.14);
        --hover: rgba(0, 0, 0, 0.04);
        --btn-bg: #f4f4f5;
        --btn-bg-hover: #e4e4e7;
        --muted: #71717a;
        --accent: #0a0a0a;
        --primary: #0a0a0a;
        --primary-fg: #ffffff;
      }
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--sans);
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      height: 100%;
      overflow: hidden; /* body never scrolls; content area handles it */
    }
    a, button:not(:disabled), select, label, input[type="checkbox"] {
      cursor: pointer;
    }
    button:disabled { cursor: default; }

    .shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px 14px 86px; /* leave room for traffic lights */
      border-bottom: 1px solid var(--border);
      user-select: none;
      -webkit-app-region: drag;
    }
    header button,
    header input,
    header a {
      -webkit-app-region: no-drag;
    }
    header .brand {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    header .brand img { width: 100%; height: 100%; object-fit: contain; }
    @media (prefers-color-scheme: dark) {
      header .brand img { filter: invert(1); }
    }
    header .title {
      font-size: 14px;
      font-weight: 600;
    }
    header .sub {
      color: var(--fg-dim);
      font-size: 12px;
      margin-left: 4px;
    }

    .content {
      flex: 1;
      padding: 18px;
      overflow-y: auto;
      scrollbar-width: none; /* Firefox */
    }
    .content::-webkit-scrollbar { width: 0; height: 0; }

    .section {
      background: var(--card-inner);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 14px;
    }
    .section:last-child { margin-bottom: 0; }

    h2 {
      font-size: 11px;
      font-weight: 600;
      margin: 0 0 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--fg-dim);
    }

    input[type="password"],
    input[type="number"],
    select {
      padding: 7px 10px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: var(--bg);
      color: inherit;
      font-size: 13px;
      font-family: var(--sans);
      outline: none;
    }
    input[type="password"] {
      flex: 1;
      font-family: var(--mono);
      letter-spacing: 0.08em;
    }
    input[type="number"] { width: 92px; font-family: var(--mono); }
    select {
      min-width: 180px;
      cursor: pointer;
      font-family: var(--sans);
    }
    input[type="password"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--fg-dim);
    }

    button {
      padding: 7px 12px;
      border: 1px solid var(--border-strong);
      border-radius: 6px;
      background: var(--btn-bg);
      color: var(--fg);
      font-size: 13px;
      font-family: var(--sans);
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s ease;
    }
    button:hover:not(:disabled) { background: var(--btn-bg-hover); }
    button:disabled { opacity: 0.4; cursor: default; }
    button.primary {
      background: var(--primary);
      color: var(--primary-fg);
      border-color: var(--primary);
    }
    button.primary:hover:not(:disabled) { opacity: 0.85; }

    .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .row + .row { margin-top: 10px; }
    .spread { display: flex; justify-content: space-between; align-items: center; }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      cursor: pointer;
      user-select: none;
    }
    input[type="checkbox"] {
      accent-color: var(--ok);
      width: 14px;
      height: 14px;
      cursor: pointer;
      margin: 0;
    }

    .status {
      font-size: 12px;
      color: var(--fg-dim);
      margin-top: 10px;
      min-height: 16px;
      font-family: var(--mono);
    }
    .status.error { color: var(--err); }
    .status.ok { color: var(--ok); }

    .hint {
      font-size: 12px;
      color: var(--fg-dim);
      margin-top: 8px;
    }
    .hint a {
      color: var(--fg);
      text-decoration: underline;
      text-decoration-color: var(--border-strong);
      text-underline-offset: 2px;
      cursor: pointer;
    }
    .hint a:hover { text-decoration-color: var(--fg-dim); }

    .project-list {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 8px 12px;
      margin-top: 10px;
      background: var(--bg);
      scrollbar-width: none;
    }
    .project-list::-webkit-scrollbar { width: 0; height: 0; }

    .empty {
      color: var(--fg-dim);
      padding: 18px 8px;
      text-align: center;
      font-size: 12px;
    }

    .project-meta {
      color: var(--fg-dimmer);
      font-size: 11.5px;
      margin-left: 4px;
      font-family: var(--mono);
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <span class="brand"><img src="../resources/app-icon.png" alt="" /></span>
      <span class="title">Deployer</span>
      <span class="sub">· Settings</span>
    </header>

    <div class="content">
      <div class="section">
        <h2>Vercel Token</h2>
        <div class="row">
          <input type="password" id="token" placeholder="paste token here" autocomplete="off" />
          <button class="primary" id="save-token">Save</button>
          <button id="clear-token">Clear</button>
        </div>
        <div class="status" id="token-status">No token set</div>
        <div class="hint">
          Create a token at
          <a id="tokens-link">vercel.com/account/tokens</a>.
          Hobby accounts have full API access.
        </div>
      </div>

      <div class="section">
        <h2>Projects</h2>
        <div class="spread">
          <span class="hint" style="margin: 0">Pick which projects to watch.</span>
          <div style="display: flex; gap: 6px">
            <button id="toggle-all-projects" disabled>Select all</button>
            <button id="refresh-projects">Refresh</button>
          </div>
        </div>
        <div class="project-list" id="project-list">
          <div class="empty">Save a valid token to load projects.</div>
        </div>
      </div>

      <div class="section">
        <h2>General</h2>
        <div class="row">
          <span style="min-width: 170px">Check every</span>
          <input type="number" id="interval" min="20" max="600" step="5" />
          <span class="hint" style="margin: 0">seconds (min 20)</span>
        </div>
        <div class="row">
          <span style="min-width: 170px">Notification</span>
          <select id="notification-duration">
            <option value="10">Dismiss after 10 seconds</option>
            <option value="30">Dismiss after 30 seconds</option>
            <option value="60">Dismiss after 60 seconds</option>
            <option value="0">Stay until dismissed</option>
          </select>
        </div>
        <div class="row">
          <label>
            <input type="checkbox" id="launch-at-login" />
            Launch Deployer at login
          </label>
        </div>
      </div>

      <div class="section">
        <h2>Updates</h2>
        <div class="row">
          <button id="check-updates">Check for updates</button>
          <span class="hint" id="update-status" style="margin: 0">—</span>
        </div>
        <div class="hint" id="update-hint" style="display: none; margin-top: 8px"></div>
      </div>
    </div>
  </div>

  <script src="./settings.js"></script>
</body>
</html>
