<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Deployer Notification</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0a0a0a;
      --bg-hover: #171717;     /* solid — we're in a transparent window */
      --fg: #f4f4f5;
      --fg-dim: #a1a1aa;
      --border: rgba(255, 255, 255, 0.08);
      --hover: rgba(255, 255, 255, 0.08);
      --ok: #22c55e;
      --err: #ef4444;
      --muted: #6b7280;
      --mono: ui-monospace, "SF Mono", Menlo, Monaco, Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --bg-hover: #f4f4f5;
        --fg: #09090b;
        --fg-dim: #52525b;
        --border: rgba(0, 0, 0, 0.08);
        --hover: rgba(0, 0, 0, 0.06);
      }
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
      font-family: var(--sans);
      color: var(--fg);
      -webkit-font-smoothing: antialiased;
      height: 100%;
    }
    a, button { cursor: pointer; }
    .card {
      display: grid;
      grid-template-columns: 12px 1fr auto 20px;
      align-items: center;
      gap: 12px;
      height: 100vh;
      padding: 12px 16px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.4);
      cursor: pointer;
      transition: background 0.12s ease;
      user-select: none;
    }
    .card:hover { background: var(--bg-hover); }

    .close {
      background: transparent;
      border: none;
      color: var(--fg-dim);
      font-size: 14px;
      line-height: 1;
      padding: 4px;
      border-radius: 4px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .close:hover { background: var(--hover); color: var(--fg); }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot.ready { background: var(--ok); }
    .dot.error { background: var(--err); }
    .dot.canceled { background: var(--muted); }

    .main { min-width: 0; }
    .project {
      font-weight: 600;
      font-size: 13px;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status {
      font-size: 12px;
      color: var(--fg-dim);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .status .duration {
      font-family: var(--mono);
      color: var(--fg);
    }
    .side {
      font-size: 11.5px;
      color: var(--fg-dim);
      text-align: right;
      white-space: nowrap;
    }
    .side .target {
      color: var(--fg);
      font-weight: 500;
      font-size: 12px;
    }
    .side .hint { margin-top: 2px; opacity: 0.7; }

    .empty {
      padding: 18px;
      color: var(--fg-dim);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <span class="dot" id="dot"></span>
    <div class="main">
      <div class="project" id="project">—</div>
      <div class="status" id="status">…</div>
    </div>
    <div class="side">
      <div class="target" id="target">—</div>
      <div class="hint">Click for details</div>
    </div>
    <button type="button" class="close" id="close" title="Dismiss">✕</button>
  </div>
  <script src="./mini.js"></script>
</body>
</html>
